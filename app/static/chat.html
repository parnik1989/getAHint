<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>getAHint Chat</title>
    <link rel="stylesheet" href="/static/chat.css" />
  </head>
  <body>
    <main id="app-shell" class="shell guest-mode">
      <section class="chat-panel" aria-label="Event chat">
        <header class="chat-header">
          <div class="brand-block">
            <h1>getAHint</h1>
            <p>Ask about events in Hyderabad</p>
          </div>
          <div class="header-actions">
            <div class="mode-switch" aria-label="Personalization mode">
              <button id="guest-mode" class="mode-button active" type="button">Guest</button>
              <button id="user-mode" class="mode-button" type="button">User</button>
            </div>
            <span id="auth-status" class="auth-status">Guest mode</span>
            <a href="/docs" class="docs-link">API Docs</a>
          </div>
        </header>

        <section id="auth-panel" class="auth-panel" aria-label="User account">
          <div class="auth-copy">
            <strong>Personalize across devices</strong>
            <span>Sign in to keep your event preferences with your account.</span>
          </div>
          <form id="auth-form" class="auth-form">
            <input id="auth-username" name="username" type="text" autocomplete="username" placeholder="Username" />
            <input id="auth-password" name="password" type="password" autocomplete="current-password" placeholder="Password" />
            <button type="submit">Login</button>
            <button id="register-button" type="button">Register</button>
          </form>
        </section>

        <div id="messages" class="messages" aria-live="polite">
          <article class="message assistant">
            <div class="bubble">
              Tell me what kind of event you are looking for. Try “Bonalu festival”, “food festival”, or “classical dance”.
            </div>
          </article>
        </div>

        <form id="chat-form" class="composer">
          <input
            id="message-input"
            name="message"
            type="text"
            autocomplete="off"
            placeholder="Search for events..."
            aria-label="Message"
            required
          />
          <button type="submit">Send</button>
        </form>
      </section>
    </main>

    <script src="/static/chat.js"></script>
  </body>
</html>
