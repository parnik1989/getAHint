name: Build and Push Docker Image + Deploy to ACI

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'Dockerfile'
      - 'requirements.txt'
      - 'app/**'
      - '.github/workflows/docker-build-push.yml'
  workflow_dispatch:
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  AZURE_RESOURCE_GROUP: "GetAHint"
  ACI_CONTAINER_GROUP_NAME: "getahint-container-group"
  ACI_CONTAINER_NAME: "getahint-app"
  ACI_PORT: "8000"

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: echo Image pushed - ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  deploy-to-aci:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          allow-no-subscriptions: false

      - name: Deploy to Azure Container Instances
        run: |
          az container create \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --name ${{ env.ACI_CONTAINER_GROUP_NAME }} \
            --image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            --registry-login-server ${{ env.REGISTRY }} \
            --registry-username ${{ github.actor }} \
            --registry-password ${{ secrets.GITHUB_TOKEN }} \
            --cpu 1 \
            --memory 1.5 \
            --ports ${{ env.ACI_PORT }} \
            --protocol TCP \
            --dns-name-label getahint-app-${{ github.run_number }} \
            --environment-variables \
              PYTHONUNBUFFERED=1 \
              PYTHONDONTWRITEBYTECODE=1 \
            --restart-policy OnFailure \
            --overwrite

      - name: Get ACI Public IP
        run: |
          PUBLIC_IP=$(az container show \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --name ${{ env.ACI_CONTAINER_GROUP_NAME }} \
            --query ipAddress.ip \
            --output tsv)
          echo "Container deployed at: http://$PUBLIC_IP:${{ env.ACI_PORT }}"
          echo "PUBLIC_IP=$PUBLIC_IP" >> $GITHUB_ENV

      - name: Verify Container Status
        run: |
          az container show \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --name ${{ env.ACI_CONTAINER_GROUP_NAME }} \
            --query '{State:containers[0].instanceView.currentState.state, Image:containers[0].image}' \
            --output table